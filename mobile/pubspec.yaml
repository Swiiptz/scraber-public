name: scraber
description: Application Android de veille cyber et vulnerabilites.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  hive_flutter: ^1.1.0
  go_router: ^14.6.2
  intl: ^0.20.1
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  cloud_firestore: ^5.6.0
  table_calendar: ^3.1.3
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  flutter_markdown_plus: ^1.0.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# Icônes générées par `dart run flutter_launcher_icons`.
# Source : `assets/icon/scraber_logo.png` (logo Scraber, coin arrondi, fond
# gris anthracite `#1C2126`). La variante adaptive utilise le même fond
# pour éviter un double-masquage sur les launchers qui appliquent leur
# propre rognage circulaire.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/scraber_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1C2126"
  adaptive_icon_foreground: "assets/icon/scraber_logo.png"
  remove_alpha_ios: false
